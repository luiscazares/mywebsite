services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  web:
    build: .
    pid: "host"
    env_file:
      - .env
    command: gunicorn djangoweb.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    expose:
      - "8000"

  finance:
    build: ../finance-dashboard
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ../finance-dashboard:/app

  home-tracker:
    build: ../home-tracker-mcp
    command: uvicorn api:app --host 0.0.0.0 --port 8002
    volumes:
      - ../home-tracker-mcp:/app
    env_file:
      - ../home-tracker-mcp/.env
    depends_on:
      - db

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    depends_on:
      - web

volumes:
  postgres_data:
  media_volume:
