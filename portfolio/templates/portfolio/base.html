{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories from the Couch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'portfolio/style.css' %}">
    <style>
        body { background-color: #121212; color: white; }
        .navbar-brand img { height: 40px; } /* Adjust logo size */
        .blog-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .blog-content blockquote {
            border-left: 5px solid #17a2b8;
            padding-left: 15px;
            font-style: italic;
            color: #ced4da;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.css" rel="stylesheet" />
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-black border-bottom border-secondary">
    <div class="container">
        <a class="navbar-brand" href="/">
            {% if request.resolver_match.url_name != 'home' %}
                <img src="{% static 'portfolio/logo.svg' %}" alt="Logo" style="height: 40px;">
            {% else %}
                <span style="visibility: hidden;">Logo</span>
            {% endif %}
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/blog/">Blog</a>
            </div>
        </div>
    </div>
</nav>

    <main class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4 border-top border-secondary mt-5">
        <p class="text-muted">&copy; 2026 Luis C.</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/toolbar/prism-toolbar.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/copy-to-clipboard/prism-copy-to-clipboard.min.js"></script>
</body>
</html>
