{% extends "portfolio/base.html" %}
{% load static %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <style>
        /* Modern Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #121212; /* Sleek dark mode */
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Flexbox Centering Container */
        .hero-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* SVG Styling */
        .centered-svg {
            width: 250px; /* Adjust size as needed */
            height: auto;
            margin-bottom: 2rem;
            background: transparent !important;
            transition: transform 0.3s ease;
        }

        .centered-svg:hover {
            transform: scale(1.05);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0;
        }

        .subtitle {
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="hero-container">
        <img src="{% static 'portfolio/logo.svg' %}" alt="Logo" class="centered-svg">
        
        <h1>Luis Cázares</h1>
        <p class="subtitle">Developer | Designer | Docker Enthusiast</p>
    </div>

</body>
</html>
{% endblock %}
