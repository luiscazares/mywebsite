{% extends "portfolio/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="text-white mb-3 fw-bold">{{ post.title }}</h1>
            <p class="text-muted small">
                Published on {{ post.created_at|date:"F d, Y" }} by {{ post.author }}
            </p>
            <hr class="border-secondary mb-4">
            
            {# Removed text-white here to let the custom CSS handle readability #}
            <div class="blog-content">
                {{ post.content|safe }}
            </div>

            <div class="mt-5 pt-4 border-top border-secondary">
                <a href="{% url 'blog_home' %}" class="read-more-btn" style="text-decoration: none;">
                    <span>←</span> Back to The Log
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
